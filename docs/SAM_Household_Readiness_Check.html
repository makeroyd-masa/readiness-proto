<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask SAM · Household Readiness Check</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --masa-horizon:#230871; --masa-tide:#0071CE; --masa-flare:#E64B38;
    --masa-shine:#FFD040; --masa-harbor:#968694; --masa-harbor-tint:#E8E3E8;
    --masa-body:#262626; --masa-white:#FFFFFF;
    --font-heading:'Poppins',sans-serif; --font-body:'Open Sans',sans-serif;
    --radius-card:12px; --radius-button:6px;
    --shadow-card:0 2px 10px rgba(35,8,113,0.10);
    --shadow-float:0 8px 30px rgba(35,8,113,0.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--font-body); color:var(--masa-body);
    background:linear-gradient(160deg,#f4f2f7 0%, #e9e5ef 100%);
    min-height:100vh; display:flex; justify-content:center; padding:24px 12px;
    -webkit-font-smoothing:antialiased;
  }
  .device{
    width:100%; max-width:468px; background:var(--masa-white);
    border-radius:22px; box-shadow:var(--shadow-float); overflow:hidden;
    display:flex; flex-direction:column; min-height:760px; position:relative;
  }
  /* Header */
  .topbar{
    background:var(--masa-horizon); color:#fff; padding:16px 18px;
    display:flex; align-items:center; gap:11px; flex-shrink:0;
  }
  .mark{width:30px;height:30px;flex-shrink:0;}
  .brandwrap{display:flex;flex-direction:column;line-height:1.15;}
  .brandwrap .sam{font-family:var(--font-heading);font-weight:700;font-size:15px;letter-spacing:.2px;}
  .brandwrap .by{font-size:10.5px;opacity:.72;letter-spacing:.3px;}
  .topbar .tag{margin-left:auto;font-size:10px;background:rgba(255,255,255,.14);
    padding:4px 9px;border-radius:20px;font-weight:600;letter-spacing:.4px;}

  /* Readiness meter (the spine) */
  .spine{padding:12px 18px 14px;border-bottom:1px solid var(--masa-harbor-tint);
    background:#faf9fc;flex-shrink:0;display:none;}
  .spine.show{display:block;}
  .spine .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
  .spine .row .lbl{font-family:var(--font-heading);font-weight:600;font-size:12px;color:var(--masa-horizon);}
  .spine .row .band{font-size:11px;font-weight:700;color:var(--masa-tide);}
  .bar{height:8px;background:var(--masa-harbor-tint);border-radius:20px;overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;border-radius:20px;
    background:linear-gradient(90deg,var(--masa-tide),var(--masa-horizon));transition:width .7s cubic-bezier(.2,.8,.2,1);}
  .spine .hint{font-size:10.5px;color:var(--masa-harbor);margin-top:6px;}

  /* Scroll body */
  .stage{flex:1;overflow-y:auto;padding:20px 18px 26px;}
  .stage::-webkit-scrollbar{width:6px;}
  .stage::-webkit-scrollbar-thumb{background:var(--masa-harbor-tint);border-radius:6px;}

  /* SAM bubble */
  .sammsg{display:flex;gap:10px;margin-bottom:16px;align-items:flex-start;}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--masa-horizon);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .avatar svg{width:17px;height:17px;}
  .bubble{background:var(--masa-harbor-tint);border-radius:4px 14px 14px 14px;
    padding:12px 14px;font-size:14.5px;line-height:1.5;color:var(--masa-body);}
  .bubble strong{color:var(--masa-horizon);font-weight:700;}
  .usermsg{display:flex;justify-content:flex-end;margin-bottom:16px;}
  .usermsg .ub{background:var(--masa-tide);color:#fff;border-radius:14px 4px 14px 14px;
    padding:9px 14px;font-size:14px;font-weight:600;max-width:80%;}

  /* Option chips */
  .opts{display:flex;flex-direction:column;gap:9px;margin:2px 0 6px 40px;}
  .opt{background:#fff;border:1.6px solid var(--masa-harbor-tint);border-radius:10px;
    padding:12px 14px;font-family:var(--font-body);font-size:14px;text-align:left;cursor:pointer;
    color:var(--masa-body);transition:all .15s;line-height:1.35;}
  .opt:hover{border-color:var(--masa-tide);background:#f5faff;transform:translateY(-1px);}
  .opt.sel{border-color:var(--masa-tide);background:#eaf4fd;font-weight:600;color:var(--masa-horizon);}
  .opt .ck{color:var(--masa-tide);font-weight:700;margin-right:6px;display:none;}
  .opt.sel .ck{display:inline;}
  .multinote{font-size:11px;color:var(--masa-harbor);margin:0 0 8px 40px;}
  .cont{margin:4px 0 0 40px;}

  /* Buttons */
  .btn{font-family:var(--font-heading);font-weight:700;font-size:14px;border:none;
    border-radius:var(--radius-button);padding:12px 20px;cursor:pointer;transition:all .15s;letter-spacing:.2px;}
  .btn-primary{background:var(--masa-tide);color:#fff;}
  .btn-primary:hover{background:#005fb0;box-shadow:0 4px 14px rgba(0,113,206,.3);}
  .btn-horizon{background:var(--masa-horizon);color:#fff;}
  .btn-horizon:hover{background:#180452;}
  .btn-ghost{background:#fff;color:var(--masa-horizon);border:2px solid var(--masa-horizon);}
  .btn-ghost:hover{background:#f3f1f9;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-block{width:100%;}

  /* Intro */
  .intro{text-align:center;padding:14px 6px 0;}
  .intro h1{font-family:var(--font-heading);font-weight:700;font-size:25px;color:var(--masa-horizon);
    line-height:1.22;margin-bottom:12px;}
  .intro p{font-size:14.5px;line-height:1.55;color:#4a4a4a;margin-bottom:22px;}
  .previewmeter{background:#faf9fc;border:1px solid var(--masa-harbor-tint);border-radius:var(--radius-card);
    padding:16px;margin-bottom:22px;text-align:left;}
  .previewmeter .t{font-family:var(--font-heading);font-weight:600;font-size:12.5px;color:var(--masa-horizon);margin-bottom:9px;}
  .pill-row{display:flex;flex-wrap:wrap;gap:6px;}
  .pill{font-size:11px;background:#fff;border:1px solid var(--masa-harbor-tint);border-radius:20px;
    padding:5px 11px;color:#555;}
  .disc{font-size:10.5px;color:var(--masa-harbor);line-height:1.5;margin-top:16px;padding:0 4px;}

  /* Building */
  .building{text-align:center;padding:60px 20px;}
  .building .avatar{width:52px;height:52px;margin:0 auto 20px;}
  .building .avatar svg{width:28px;height:28px;}
  .building h2{font-family:var(--font-heading);font-weight:600;font-size:17px;color:var(--masa-horizon);margin-bottom:18px;}
  .buildline{font-size:13px;color:#666;opacity:0;transform:translateY(6px);
    transition:all .4s;margin-bottom:9px;line-height:1.4;}
  .buildline.on{opacity:1;transform:none;}
  .dots{display:inline-flex;gap:5px;margin-top:8px;}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--masa-tide);animation:bounce 1.2s infinite;}
  .dots i:nth-child(2){animation-delay:.18s;}.dots i:nth-child(3){animation-delay:.36s;}
  @keyframes bounce{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}

  /* Result */
  .scorecard{background:linear-gradient(140deg,var(--masa-horizon),var(--masa-tide));
    border-radius:var(--radius-card);padding:20px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden;}
  .scorecard .mk{position:absolute;right:-14px;top:-14px;opacity:.13;}
  .scorecard .mk svg{width:96px;height:96px;}
  .scorecard .kicker{font-size:11px;letter-spacing:.6px;text-transform:uppercase;opacity:.8;font-weight:600;}
  .scorecard .band{font-family:var(--font-heading);font-weight:700;font-size:23px;margin:3px 0 2px;}
  .scorecard .pct{font-size:12.5px;opacity:.85;}
  .scorecard .barwrap{margin-top:13px;}
  .scorecard .barwrap .bar{background:rgba(255,255,255,.22);}
  .scorecard .barwrap .bar > i{background:var(--masa-shine);}

  .section-h{font-family:var(--font-heading);font-weight:600;font-size:13px;color:var(--masa-horizon);
    text-transform:uppercase;letter-spacing:.5px;margin:20px 0 11px;}
  .dim{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #f0eef4;}
  .dim:last-child{border-bottom:none;}
  .dim .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dim .dname{font-size:13.5px;font-weight:600;color:var(--masa-body);flex:1;}
  .dim .chip{font-family:var(--font-heading);font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:20px;white-space:nowrap;}
  .chip-good{background:#e6f4ec;color:#1c7a45;}
  .chip-watch{background:#fff4e0;color:#a86a10;}
  .chip-soon{background:rgba(230,75,56,.12);color:var(--masa-flare);}

  .step{background:#faf9fc;border:1px solid var(--masa-harbor-tint);border-left:3px solid var(--masa-tide);
    border-radius:8px;padding:13px 14px;margin-bottom:11px;}
  .step .num{font-family:var(--font-heading);font-weight:700;font-size:12px;color:var(--masa-tide);}
  .step .st{font-family:var(--font-heading);font-weight:600;font-size:14.5px;color:var(--masa-horizon);margin:2px 0 5px;}
  .step .sd{font-size:13px;line-height:1.5;color:#555;}
  .mayo{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font-size:11px;
    color:#0a6b52;background:#e7f5f0;padding:4px 9px;border-radius:6px;font-weight:600;}
  .mayo::before{content:"✚";font-size:12px;}

  /* Artifact card preview */
  .artifact{border:1.5px solid var(--masa-harbor-tint);border-radius:var(--radius-card);
    overflow:hidden;margin-bottom:6px;box-shadow:var(--shadow-card);}
  .artifact .ahead{background:var(--masa-horizon);color:#fff;padding:11px 15px;display:flex;align-items:center;gap:8px;}
  .artifact .ahead svg{width:16px;height:16px;}
  .artifact .ahead .at{font-family:var(--font-heading);font-weight:600;font-size:13px;}
  .artifact .abody{padding:14px 15px;}
  .field{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed #ece9f2;font-size:13px;}
  .field:last-child{border-bottom:none;}
  .field .fl{color:var(--masa-harbor);font-weight:600;}
  .field .fv{color:var(--masa-body);text-align:right;}
  .field .fv.empty{color:#c3bcc9;font-style:italic;}

  /* Alert / coverage seam */
  .alert{background:rgba(230,75,56,.06);border:1px solid rgba(230,75,56,.25);border-left:4px solid var(--masa-flare);
    border-radius:8px;padding:14px 15px;margin-bottom:14px;}
  .alert .ah{font-family:var(--font-heading);font-weight:700;font-size:14px;color:var(--masa-flare);margin-bottom:6px;}
  .alert .costgrid{display:flex;gap:8px;margin:11px 0;}
  .alert .cc{flex:1;background:#fff;border:1px solid var(--masa-harbor-tint);border-radius:8px;padding:9px;text-align:center;}
  .alert .cc .cn{font-family:var(--font-heading);font-weight:700;font-size:16px;color:var(--masa-horizon);}
  .alert .cc .cl{font-size:10px;color:var(--masa-harbor);margin-top:2px;line-height:1.3;}
  .alert .src{font-size:10px;color:var(--masa-harbor);margin-top:2px;}

  /* Follow-up chips */
  .followwrap{margin-top:6px;}
  .followlabel{font-size:12px;color:var(--masa-harbor);margin-bottom:9px;font-weight:600;}
  .chiprow{display:flex;flex-direction:column;gap:8px;}
  .chip-btn{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--masa-harbor-tint);
    border-radius:22px;padding:10px 15px;font-size:13.5px;text-align:left;cursor:pointer;color:var(--masa-horizon);
    font-weight:600;transition:all .15s;font-family:var(--font-body);}
  .chip-btn:hover{border-color:var(--masa-tide);background:#f5faff;}
  .chip-btn .ci{font-size:15px;flex-shrink:0;}
  .chip-btn.done{opacity:.5;pointer-events:none;}
  .chip-btn.done .ci::after{content:" ✓";}

  /* mini form (emergency card builder) */
  .cardform{background:#faf9fc;border:1px solid var(--masa-harbor-tint);border-radius:10px;padding:14px;margin:2px 0 6px 40px;}
  .cardform label{display:block;font-size:11.5px;font-weight:600;color:var(--masa-horizon);margin:8px 0 3px;}
  .cardform input{width:100%;border:1px solid var(--masa-harbor-tint);border-radius:6px;padding:8px 10px;
    font-family:var(--font-body);font-size:13px;color:var(--masa-body);}
  .cardform input:focus{outline:none;border-color:var(--masa-tide);}

  .ctaband{background:var(--masa-horizon);border-radius:var(--radius-card);padding:18px;margin:16px 0 6px;text-align:center;}
  .ctaband h3{font-family:var(--font-heading);font-weight:700;font-size:16px;color:#fff;margin-bottom:6px;}
  .ctaband p{font-size:13px;color:rgba(255,255,255,.85);line-height:1.5;margin-bottom:14px;}

  .footdisc{font-size:10.5px;color:var(--masa-harbor);text-align:center;line-height:1.5;margin-top:20px;padding:0 8px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="device">

  <!-- Header -->
  <div class="topbar">
    <span class="mark" id="markSlot"></span>
    <div class="brandwrap">
      <span class="sam">Ask SAM</span>
      <span class="by">from MASA</span>
    </div>
    <span class="tag">READINESS CHECK</span>
  </div>

  <!-- Readiness meter spine -->
  <div class="spine" id="spine">
    <div class="row">
      <span class="lbl">Your Family Readiness File</span>
      <span class="band" id="spineBand">—</span>
    </div>
    <div class="bar"><i id="spineFill"></i></div>
    <div class="hint" id="spineHint">SAM keeps this updated as things change.</div>
  </div>

  <!-- Stage -->
  <div class="stage" id="stage"></div>
</div>

<script>
/* ---------- MASA "+" mark (programmatic fallback, no logo asset) ---------- */
function mark(color){
  return `<svg viewBox="0 0 40 40" xmlns="https://url.usb.m.mimecastprotect.com/s/bqvCCm7mR7sJyZKiGfBfRVcsO?domain=w3.org">
    <path fill="${color}" d="M24.5 3.5a4 4 0 0 0-4-4h-1a4 4 0 0 0-4 4v8a4 4 0 0 1-4 4h-8a4 4 0 0 0-4 4v1a4 4 0 0 0 4 4h8a4 4 0 0 1 4 4v8a4 4 0 0 0 4 4h1a4 4 0 0 0 4-4v-8a4 4 0 0 1 4-4h8a4 4 0 0 0 4-4v-1a4 4 0 0 0-4-4h-8a4 4 0 0 1-4-4z" transform="translate(0.5 0.5)"/>
  </svg>`;
}
document.getElementById('markSlot').innerHTML = mark('#FFFFFF');

/* ---------- State: the Family Readiness File ---------- */
const profile = {
  householdType:null, vulnerability:null, geoRisk:null,
  haveItems:[], topWorry:null,
  cardBuilt:false, checkinSet:false
};
let qIndex = 0;

/* ---------- Questions (branching intake) ---------- */
const QUESTIONS = [
  {
    key:'householdType', multi:false,
    sam:"Let's find out how ready your household is if a medical emergency hit today — it takes about 5 minutes, and you'll leave with a plan you can actually use.<br><br><strong>First: who's in your household?</strong>",
    options:[
      {v:'solo', t:"Just me"},
      {v:'couple', t:"Me and my partner or spouse"},
      {v:'kids', t:"A family with kids at home"},
      {v:'multigen', t:"Multi-generational — kids and an older parent"},
      {v:'caregiver', t:"I help care for an aging parent (nearby or far away)"}
    ]
  },
  {
    key:'vulnerability', multi:false,
    sam:"Got it. In an emergency, would anyone in your household have trouble speaking or advocating for themselves?",
    options:[
      {v:'none', t:"No — everyone's healthy and independent"},
      {v:'condition', t:"Yes — someone has a chronic condition or takes daily medications"},
      {v:'mobility', t:"Yes — someone has mobility limits or memory/cognitive changes"},
      {v:'children', t:"Yes — young kids who couldn't advocate for themselves"}
    ]
  },
  {
    key:'geoRisk', multi:false,
    sam:"Where you live changes what \"ready\" looks like. Does any of this apply to you?",
    options:[
      {v:'disaster', t:"We're in a hurricane, flood, or wildfire-prone area"},
      {v:'rural', t:"We're rural or far from a major hospital"},
      {v:'travel', t:"We travel often or split time between two homes"},
      {v:'none', t:"None of these really apply"}
    ]
  },
  {
    key:'haveItems', multi:true,
    sam:"Which of these does your household already have in place? <strong>Pick any that apply</strong> — this is what sets your readiness score.",
    options:[
      {v:'meds', t:"A current list of everyone's meds, allergies, and conditions"},
      {v:'contacts', t:"An emergency contact list everyone can find"},
      {v:'proxy', t:"Someone legally able to make medical decisions if you can't"},
      {v:'coverage', t:"A plan for covering a surprise ambulance or hospital bill"},
      {v:'gobag', t:"A go-bag or evacuation plan"},
      {v:'none', t:"Honestly… none of these yet"}
    ]
  },
  {
    key:'topWorry', multi:false,
    sam:"Last one. When you picture an emergency, what worries you most?",
    options:[
      {v:'speak', t:"No one would have the right info if someone couldn't speak"},
      {v:'chaos', t:"We'd panic or get separated and not know what to do"},
      {v:'cost', t:"The cost — ambulance, hospital, transport"},
      {v:'distance', t:"Being far from the right care when it happens"},
      {v:'unsure', t:"Not sure — that's kind of why I'm here"}
    ]
  }
];

/* ---------- Render helpers ---------- */
const stage = document.getElementById('stage');
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}
function scrollBottom(){stage.scrollTop = stage.scrollHeight;}
function samBubble(text){
  return `<div class="sammsg"><div class="avatar">${mark('#FFFFFF')}</div><div class="bubble">${text}</div></div>`;
}
function userBubble(text){
  return `<div class="usermsg"><div class="ub">${text}</div></div>`;
}

/* ---------- Intro ---------- */
function renderIntro(){
  stage.innerHTML = `
    <div class="intro">
      <div class="avatar" style="width:46px;height:46px;margin:6px auto 16px;">${mark('#FFFFFF')}</div>
      <h1>Would your household know what to do in a medical emergency?</h1>
      <p>Most families assume they're ready. Then the moment comes and no one can find a medication list, a phone number, or who's allowed to make decisions.</p>
      <div class="previewmeter">
        <div class="t">In 5 minutes, SAM builds you:</div>
        <div class="pill-row">
          <span class="pill">A readiness score</span>
          <span class="pill">Your top 3 next steps</span>
          <span class="pill">An emergency info card</span>
          <span class="pill">A plan you can share</span>
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="startFlow()">Start my readiness check →</button>
      <div class="disc">SAM offers guidance, not medical advice. In an emergency, always call 911.</div>
    </div>`;
}

/* ---------- Flow ---------- */
function startFlow(){
  qIndex = 0;
  stage.innerHTML = '';
  document.getElementById('spine').classList.remove('show');
  askQuestion();
}

function askQuestion(){
  const q = QUESTIONS[qIndex];
  stage.appendChild(el(samBubble(q.sam)));
  const opts = document.createElement('div');
  opts.className = 'opts';
  q.options.forEach(o=>{
    const b = el(`<button class="opt" data-v="${o.v}"><span class="ck">✓</span>${o.t}</button>`);
    b.onclick = ()=>selectOption(q,o,b,opts);
    opts.appendChild(b);
  });
  stage.appendChild(opts);
  if(q.multi){
    stage.appendChild(el(`<div class="multinote">Select all that apply, then continue.</div>`));
    const cont = el(`<div class="cont"><button class="btn btn-horizon" id="contBtn" disabled onclick="commitMulti()">Continue →</button></div>`);
    stage.appendChild(cont);
    currentOpts = opts; currentQ = q;
  }
  scrollBottom();
}

let currentOpts=null, currentQ=null;
function selectOption(q,o,btn,opts){
  if(q.multi){
    if(o.v==='none'){
      opts.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
      btn.classList.add('sel');
    } else {
      opts.querySelector('[data-v="none"]')?.classList.remove('sel');
      btn.classList.toggle('sel');
    }
    const any = opts.querySelectorAll('.opt.sel').length>0;
    document.getElementById('contBtn').disabled = !any;
  } else {
    profile[q.key] = o.v;
    opts.querySelectorAll('.opt').forEach(x=>x.style.pointerEvents='none');
    btn.classList.add('sel');
    stage.appendChild(el(userBubble(o.t)));
    advance();
  }
}
function commitMulti(){
  const sel = [...currentOpts.querySelectorAll('.opt.sel')].map(x=>x.dataset.v);
  profile[currentQ.key] = sel.includes('none') ? [] : sel;
  currentOpts.querySelectorAll('.opt').forEach(x=>x.style.pointerEvents='none');
  document.getElementById('contBtn').closest('.cont').remove();
  const label = sel.includes('none') ? "None of these yet" : `${sel.length} in place`;
  stage.appendChild(el(userBubble(label)));
  advance();
}
function advance(){
  qIndex++;
  scrollBottom();
  if(qIndex < QUESTIONS.length){
    setTimeout(askQuestion, 380);
  } else {
    setTimeout(showBuilding, 420);
  }
}

/* ---------- Building screen (shows personalization) ---------- */
function showBuilding(){
  const lines = personalizedBuildLines();
  stage.innerHTML = `
    <div class="building">
      <div class="avatar">${mark('#FFFFFF')}</div>
      <h2>Building your readiness plan…</h2>
      <div id="bl"></div>
      <div class="dots"><i></i><i></i><i></i></div>
    </div>`;
  const bl = document.getElementById('bl');
  lines.forEach((t,i)=>{
    const l = el(`<div class="buildline">${t}</div>`);
    bl.appendChild(l);
    setTimeout(()=>l.classList.add('on'), 350 + i*680);
  });
  setTimeout(renderResult, 350 + lines.length*680 + 550);
}
function personalizedBuildLines(){
  const L=[];
  const who = {solo:"you",couple:"you and your partner",kids:"your family",multigen:"your multi-generational household",caregiver:"you and your parent"}[profile.householdType];
  L.push(`Reading your household: <strong>${who}</strong>…`);
  if(profile.vulnerability!=='none') L.push("Flagging that someone may not be able to speak for themselves…");
  if(profile.geoRisk==='disaster') L.push("Adding evacuation and medication-supply steps for your area…");
  if(profile.geoRisk==='distance'||profile.householdType==='caregiver') L.push("Prioritizing remote-coordination steps…");
  if(profile.topWorry==='cost'||!profile.haveItems.includes('coverage')) L.push("Checking your exposure to emergency-transport costs…");
  L.push("Choosing the 3 steps that matter most for you…");
  return L;
}

/* ---------- Scoring logic ---------- */
const DIM_ITEM = {info:'meds', people:'contacts', coverage:'coverage', supplies:'gobag'};
function scoreDimensions(){
  const has = v=>profile.haveItems.includes(v);
  const dims = [];

  // Information
  dims.push({name:"Emergency information", status: (has('meds')||profile.cardBuilt)?'good':(profile.vulnerability!=='none'?'soon':'watch')});
  // People & roles
  const peopleGood = has('contacts') && (has('proxy')||profile.vulnerability==='none');
  dims.push({name:"People & roles", status: peopleGood?'good':(has('contacts')?'watch':(profile.vulnerability!=='none'?'soon':'watch'))});
  // Coverage
  dims.push({name:"Emergency-cost coverage", status: has('coverage')?'good':(profile.topWorry==='cost'?'soon':'watch')});
  // Supplies & plan
  dims.push({name:"Supplies & written plan", status: has('gobag')?'good':(profile.geoRisk==='disaster'?'soon':'watch')});
  // Personalized 5th
  const p5 = personalizedDim();
  if(p5) dims.push(p5);
  return dims;
}
function personalizedDim(){
  switch(profile.householdType){
    case 'caregiver': return {name:"Remote coordination access", status: profile.geoRisk==='distance'?'soon':'watch'};
    case 'multigen': return {name:"Roles across generations", status:'watch'};
    case 'kids': return {name:"Kids' emergency instructions", status:'watch'};
    case 'travel': return {name:"Away-from-home readiness", status:'watch'};
    default:
      if(profile.geoRisk==='travel') return {name:"Away-from-home readiness", status:'watch'};
      return {name:"Solo emergency backup", status: profile.vulnerability!=='none'?'soon':'watch'};
  }
}
function readinessPct(){
  const dims = scoreDimensions();
  const w = {good:1, watch:0.45, soon:0.15};
  let s = dims.reduce((a,d)=>a+w[d.status],0)/dims.length;
  let pct = Math.round(s*100);
  // never 100% — always something to improve
  return Math.min(pct, 92);
}
function bandFor(pct){
  if(pct < 40) return "Getting started";
  if(pct < 70) return "Getting there";
  return "Well prepared";
}

/* ---------- Next steps (dynamic, worry-ordered) ---------- */
function nextSteps(){
  const has = v=>profile.haveItems.includes(v);
  const steps = [];
  const push = (s)=>{ if(steps.length<3) steps.push(s); };

  // Priority driven by top worry
  if(profile.topWorry==='cost' || !has('coverage')){
    push({title:"Close the emergency-transport gap", desc:"Most health plans leave a large gap on ambulance and air transport. This is the single biggest surprise-cost risk for your household.", mayo:null, seam:true});
  }
  if((profile.vulnerability!=='none' || profile.topWorry==='speak') && !has('meds') && !profile.cardBuilt){
    push({title:"Create an emergency medical card", desc:"A single card with medications, allergies, conditions, and contacts that a first responder or family member can find fast.", mayo:"Mayo Clinic: what to include on an emergency medical ID"});
  }
  if(!has('proxy') && (profile.vulnerability!=='none' || profile.householdType!=='solo')){
    push({title:"Name who can make medical decisions", desc:"Decide — and document — who can speak for each adult if they can't speak for themselves.", mayo:"Mayo Clinic: health care proxy & advance directive basics"});
  }
  if(profile.geoRisk==='disaster' && !has('gobag')){
    push({title:"Build a medication + evacuation go-bag", desc:"Keep several days of medications and copies of key documents ready to grab.", mayo:"Mayo Clinic: managing medications during an evacuation"});
  }
  if((profile.householdType==='caregiver') && steps.length<3){
    push({title:"Set up remote access to your parent's care", desc:"Line up the authorizations you'd need to talk to a hospital and see coverage on your parent's behalf — before a crisis, not during one.", mayo:"Mayo Clinic: being a health care advocate for a loved one"});
  }
  if(!has('contacts') && steps.length<3){
    push({title:"Build a shared emergency contact tree", desc:"One list everyone can reach — who to call first, second, and who reaches whom.", mayo:null});
  }
  // Fallback
  if(steps.length<3){
    push({title:"Turn this into a written household plan", desc:"Put roles, contacts, and steps in one place everyone can find.", mayo:null});
  }
  return steps.slice(0,3);
}

/* ---------- Result screen ---------- */
function renderResult(){
  stage.innerHTML = '';
  document.getElementById('spine').classList.add('show');
  updateSpine();

  const pct = readinessPct();
  const band = bandFor(pct);
  const dims = scoreDimensions();

  // Score card
  const opener = {
    'Getting started':"Good news: you showed up. You've got real gaps, but they're fixable — and I've picked the three that matter most.",
    'Getting there':"You're partway there. A few key pieces are missing, and closing them makes the biggest difference.",
    'Well prepared':"You're ahead of most households. Let's tighten the last few things so nothing's left to chance."
  }[band];

  stage.appendChild(el(samBubble(`Here's where your household stands. ${opener}`)));

  const sc = el(`
    <div class="scorecard">
      <span class="mk">${mark('#FFFFFF')}</span>
      <div class="kicker">Household readiness</div>
      <div class="band">${band}</div>
      <div class="pct">${pct}% ready · ${dims.filter(d=>d.status==='good').length} of ${dims.length} areas solid</div>
      <div class="barwrap"><div class="bar"><i style="width:${pct}%"></i></div></div>
    </div>`);
  stage.appendChild(sc);

  // Dimensions
  stage.appendChild(el(`<div class="section-h">Your readiness, area by area</div>`));
  const dwrap = document.createElement('div');
  dims.forEach(d=>{
    const map = {good:['#1c7a45','chip-good','In good shape'], watch:['#d99311','chip-watch','Worth addressing'], soon:['var(--masa-flare)','chip-soon','Do this soon']};
    const m = map[d.status];
    dwrap.appendChild(el(`<div class="dim"><span class="dot" style="background:${m[0]}"></span>
      <span class="dname">${d.name}</span><span class="chip ${m[1]}">${m[2]}</span></div>`));
  });
  stage.appendChild(dwrap);

  // Next steps
  stage.appendChild(el(`<div class="section-h">Your top 3 next steps</div>`));
  const steps = nextSteps();
  steps.forEach((s,i)=>{
    if(s.seam){
      // coverage-gap alert style handled below as its own reveal; show as step with link
      stage.appendChild(el(`<div class="step" style="border-left-color:var(--masa-flare)">
        <div class="num" style="color:var(--masa-flare)">STEP ${i+1}</div>
        <div class="st">${s.title}</div>
        <div class="sd">${s.desc}</div>
        <div style="margin-top:9px"><a onclick="fu_cost()" style="color:var(--masa-tide);font-weight:700;cursor:pointer;font-size:13px">See what an ambulance would actually cost me →</a></div>
      </div>`));
    } else {
      stage.appendChild(el(`<div class="step">
        <div class="num">STEP ${i+1}</div>
        <div class="st">${s.title}</div>
        <div class="sd">${s.desc}</div>
        ${s.mayo?`<div class="mayo">${s.mayo}</div>`:''}
      </div>`));
    }
  });

  // Artifact preview
  stage.appendChild(el(`<div class="section-h">The artifact SAM made for you</div>`));
  renderArtifact();

  // Follow-up loops
  stage.appendChild(el(`<div class="section-h">What next?</div>`));
  renderFollowups();

  // Footer
  stage.appendChild(el(`<div class="footdisc">SAM offers guidance, not medical advice. Guidance is grounded in Mayo Clinic content. Emergency-cost figures: Consumer Reports (2021) and MASA claims data. In an emergency, call 911.</div>`));

  scrollBottom(); stage.scrollTop = 0;
}

function renderArtifact(){
  const built = profile.cardBuilt;
  const a = el(`
    <div class="artifact" id="artifactBox">
      <div class="ahead">${mark('#FFFFFF')}<span class="at">Emergency Medical Card${built?' · saved':''}</span></div>
      <div class="abody" id="artBody"></div>
    </div>`);
  stage.appendChild(a);
  fillArtifact();
  if(!built){
    stage.appendChild(el(`<div style="margin-top:10px;margin-bottom:4px"><button class="btn btn-primary btn-block" onclick="fu_card()">Fill in my emergency card →</button></div>`));
  }
}
function fillArtifact(){
  const b = document.getElementById('artBody');
  const c = profile.card || {};
  const row = (l,v)=>`<div class="field"><span class="fl">${l}</span><span class="fv ${v?'':'empty'}">${v||'— add this —'}</span></div>`;
  b.innerHTML =
    row('Name', c.name) +
    row('Medications', c.meds) +
    row('Allergies', c.allergies) +
    row('Conditions', c.conditions) +
    row('Emergency contact', c.contact) +
    row('Coverage', c.coverage);
}

/* ---------- Spine update ---------- */
function updateSpine(){
  const pct = readinessPct();
  document.getElementById('spineFill').style.width = pct+'%';
  document.getElementById('spineBand').textContent = bandFor(pct)+' · '+pct+'%';
  let hint = "SAM keeps this updated as things change.";
  if(profile.checkinSet) hint = "Check-in on: SAM will refresh this every 6 months.";
  else if(pct<92) hint = "There's always a next step — SAM will nudge you.";
  document.getElementById('spineHint').textContent = hint;
}

/* ---------- Follow-up chips (the engagement engine) ---------- */
function renderFollowups(){
  const wrap = el(`<div class="followwrap"><div class="followlabel">Tap a question to keep going — SAM adapts as you do:</div><div class="chiprow" id="chiprow"></div></div>`);
  stage.appendChild(wrap);
  const row = wrap.querySelector('#chiprow');
  const chips = [
    {id:'card', ci:'🪪', t:"What belongs in our emergency card?", fn:fu_card},
    {id:'cost', ci:'💵', t:"How much would an ambulance actually cost me?", fn:fu_cost},
    {id:'share', ci:'📤', t:profile.householdType==='caregiver'?"Send this to my sibling to add their part":"Send this to my partner to add their part", fn:fu_share},
    {id:'checkin', ci:'🔁', t:"Have SAM check in as things change", fn:fu_checkin},
    {id:'human', ci:'💬', t:"I'd rather talk to a person about this", fn:fu_human},
  ];
  chips.forEach(c=>{
    const b = el(`<button class="chip-btn" id="chip_${c.id}"><span class="ci">${c.ci}</span>${c.t}</button>`);
    b.onclick = c.fn;
    row.appendChild(b);
  });
}
function markChipDone(id){const c=document.getElementById('chip_'+id); if(c) c.classList.add('done');}

/* ---------- Wired follow-up: emergency card (deepens profile, raises meter) ---------- */
function fu_card(){
  markChipDone('card');
  stage.appendChild(el(userBubble("What belongs in our emergency card?")));
  stage.appendChild(el(samBubble(`A good emergency card is short enough that a stranger can read it in ten seconds. Here's what to include — I'll turn your answers into your card and add it to your Readiness File.<div class="mayo" style="margin-top:10px">Mayo Clinic: what to include on an emergency medical ID</div>`)));
  const form = el(`
    <div class="cardform">
      <label>Who is this card for?</label>
      <input id="c_name" placeholder="e.g. Robert M.">
      <label>Daily medications</label>
      <input id="c_meds" placeholder="e.g. Metoprolol, Eliquis">
      <label>Allergies</label>
      <input id="c_allergies" placeholder="e.g. Penicillin">
      <label>Conditions</label>
      <input id="c_conditions" placeholder="e.g. AFib, Type 2 diabetes">
      <label>Emergency contact</label>
      <input id="c_contact" placeholder="e.g. Susan M. (daughter) 555-0142">
      <div style="margin-top:14px"><button class="btn btn-primary btn-block" onclick="saveCard()">Save to my Readiness File →</button></div>
    </div>`);
  stage.appendChild(form);
  scrollBottom();
}
function saveCard(){
  profile.card = {
    name: val('c_name'), meds: val('c_meds'), allergies: val('c_allergies'),
    conditions: val('c_conditions'), contact: val('c_contact'),
    coverage: profile.haveItems.includes('coverage') ? 'On file' : 'Not set — see gap'
  };
  profile.cardBuilt = true;
  document.querySelector('.cardform').remove();
  stage.appendChild(el(samBubble(`Saved. Your <strong>Emergency information</strong> area just moved up, and your card is now part of your Readiness File — I'll remind everyone in your household where to find it.`)));
  // refresh artifact + score
  const oldArt = document.getElementById('artifactBox'); if(oldArt){ const p=oldArt.parentNode; }
  document.getElementById('artifactBox').querySelector('.at').innerHTML = 'Emergency Medical Card · saved';
  fillArtifact();
  updateSpine();
  animateScorecard();
  scrollBottom();
}
function val(id){return document.getElementById(id).value.trim();}

/* ---------- Wired follow-up: cost reveal (the coverage seam) ---------- */
function fu_cost(){
  markChipDone('cost');
  stage.appendChild(el(userBubble("How much would an ambulance actually cost me?")));
  stage.appendChild(el(samBubble(`Here's the part most households never see coming. Even <strong>with</strong> health insurance, emergency transport is where the surprise bills live:`)));
  stage.appendChild(el(`
    <div class="alert">
      <div class="ah">The gap most families don't know about</div>
      <div class="costgrid">
        <div class="cc"><div class="cn">$2,000</div><div class="cl">Avg. ground ambulance</div></div>
        <div class="cc"><div class="cn">$69,000</div><div class="cl">Avg. air ambulance</div></div>
        <div class="cc"><div class="cn">79%</div><div class="cl">Chance of an out-of-pocket bill</div></div>
      </div>
      <div class="src">Source: Consumer Reports (2021); MASA claims data.</div>
    </div>`));
  stage.appendChild(el(samBubble(`MASA membership covers approved emergency ground and air transport — no deductibles, no network limits, no health questions. It's the one gap on your list I can actually close for you today.`)));
  stage.appendChild(el(`
    <div class="ctaband">
      <h3>See how MASA closes this gap</h3>
      <p>One predictable membership fee. It's the piece your readiness plan is missing.</p>
      <button class="btn btn-primary btn-block" onclick="alert('→ Prototype: routes to coverage check / plan comparison / seminar registration.')">Check my coverage options →</button>
    </div>`));
  scrollBottom();
}

/* ---------- Wired follow-up: share (multi-user) ---------- */
function fu_share(){
  markChipDone('share');
  const who = profile.householdType==='caregiver' ? 'your sibling' : (profile.householdType==='solo'?'a trusted contact':'your partner');
  stage.appendChild(el(userBubble("Send this so someone can add their part")));
  stage.appendChild(el(samBubble(`Done — I've created a shareable link to your Readiness File. When ${who} opens it, I'll ask <strong>them</strong> what they'd handle in an emergency and merge it into your plan. A plan the whole household can see beats one that lives in your head.<div style="margin-top:10px"><button class="btn btn-ghost" onclick="alert('→ Prototype: opens share sheet / copies link.')">📋 Copy readiness link</button></div>`)));
  scrollBottom();
}

/* ---------- Wired follow-up: check-in (change detection / evergreen) ---------- */
function fu_checkin(){
  markChipDone('checkin');
  profile.checkinSet = true;
  updateSpine();
  const subject = profile.householdType==='caregiver' ? "your parent's living situation, medications, and any falls"
    : profile.householdType==='solo' ? "your medications, contacts, and coverage"
    : "your household's meds, roles, and any changes";
  stage.appendChild(el(userBubble("Check in as things change")));
  stage.appendChild(el(samBubble(`You're set. I'll check in every six months — and next time I won't start from scratch. I'll ask what's <strong>changed</strong>: “Last time you told me ${subject}. Anything different now?”<br><br>That's the point of the Readiness File — it gets smarter every time, so being prepared stops being a one-time chore.`)));
  scrollBottom();
}

/* ---------- Wired follow-up: human escalation ---------- */
function fu_human(){
  markChipDone('human');
  stage.appendChild(el(userBubble("I'd rather talk to a person")));
  stage.appendChild(el(samBubble(`Of course. I can hand your Readiness File to a MASA member advocate so you don't have to repeat any of this — they'll pick up exactly where we left off.<div style="margin-top:10px"><button class="btn btn-horizon" onclick="alert('→ Prototype: routes to human advocate with full context handoff.')">Connect me with an advocate →</button></div>`)));
  scrollBottom();
}

/* ---------- Scorecard re-animate on profile change ---------- */
function animateScorecard(){
  const pct = readinessPct();
  const sc = document.querySelector('.scorecard');
  if(!sc) return;
  sc.querySelector('.band').textContent = bandFor(pct);
  sc.querySelector('.pct').textContent = `${pct}% ready · updated`;
  sc.querySelector('.barwrap .bar > i').style.width = pct+'%';
}

/* ---------- Boot ---------- */
renderIntro();
</script>
